<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chai AI — Your Thinking Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF6EF;
    --milk:#FFFFFF;
    --tan:#F0E3D2;
    --tan-2:#E6D5BE;
    --coffee-dark:#3E2A1E;
    --coffee:#6B4426;
    --coffee-light:#A9784F;
    --copper:#B8703B;
    --copper-soft:#E3A876;
    --muted:#8C7461;
    --line:#E7D9C6;
    --shadow: 0 8px 24px rgba(74,46,26,0.08);
    --radius: 18px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter', sans-serif;
    background:var(--cream);
    color:var(--coffee-dark);
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    width:100vw;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:290px;
    min-width:290px;
    background:var(--tan);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    padding:22px 18px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:26px;
  }
  .brand-mark{
    width:44px; height:44px;
    border-radius:14px;
    background:linear-gradient(155deg, var(--coffee) 0%, var(--copper) 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    flex-shrink:0;
  }
  .brand-name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:19px;
    color:var(--coffee-dark);
    line-height:1.1;
  }
  .brand-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .new-chat-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    background:var(--coffee-dark);
    color:var(--cream);
    font-family:'Inter';
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
    margin-bottom:22px;
  }
  .new-chat-btn:hover{ background:var(--coffee); transform:translateY(-1px); }
  .new-chat-btn:active{ transform:translateY(0); }

  .history-label{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
    margin-bottom:10px;
    display:flex; justify-content:space-between;
  }
  .history-list{
    flex:1;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:8px;
  }
  .history-item{
    display:flex; align-items:flex-start; gap:10px;
    padding:11px 12px;
    border-radius:12px;
    cursor:pointer;
    background:transparent;
    border:1px solid transparent;
    transition: background .15s ease, border-color .15s ease;
    position:relative;
  }
  .history-item:hover{ background:var(--milk); }
  .history-item.active{ background:var(--milk); border-color:var(--tan-2); box-shadow:var(--shadow); }
  .history-icon{
    width:26px; height:26px; border-radius:8px;
    background:var(--tan-2);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:1px;
  }
  .history-text{ flex:1; min-width:0; }
  .history-title{
    font-size:13.5px; font-weight:600; color:var(--coffee-dark);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .history-meta{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .history-del{
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:14px; opacity:0; transition:opacity .15s ease;
    padding:2px 4px;
  }
  .history-item:hover .history-del{ opacity:1; }
  .history-del:hover{ color:#B44; }

  .clear-btn{
    margin-top:14px;
    width:100%;
    padding:11px;
    border-radius:12px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition: background .15s ease, color .15s ease;
  }
  .clear-btn:hover{ background:var(--milk); color:#B44; }

  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    background:var(--cream);
    min-width:0;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 30px;
    border-bottom:1px solid var(--line);
    background:var(--milk);
  }
  .topbar-left{ display:flex; align-items:center; gap:12px; }
  .avatar-sm{
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(155deg, var(--coffee) 0%, var(--copper) 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .topbar-title{ font-family:'Fraunces', serif; font-weight:600; font-size:17px; }
  .status{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted); margin-top:1px; }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:#7FA86B; }

  .export-btn{
    padding:9px 16px;
    border-radius:11px;
    border:1px solid var(--line);
    background:var(--milk);
    color:var(--coffee-dark);
    font-size:13px; font-weight:600;
    cursor:pointer;
    transition: background .15s ease;
  }
  .export-btn:hover{ background:var(--tan); }

  .messages{
    flex:1;
    overflow-y:auto;
    padding:28px 40px;
    display:flex; flex-direction:column; gap:22px;
  }
  .msg-row{ display:flex; gap:12px; max-width:720px; }
  .msg-row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .msg-avatar{
    width:34px; height:34px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:var(--milk);
  }
  .msg-avatar.assistant{ background:linear-gradient(155deg, var(--coffee) 0%, var(--copper) 100%); }
  .msg-avatar.user{ background:var(--coffee-dark); }
  .msg-bubble{
    padding:14px 17px;
    border-radius:16px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg-row.assistant .msg-bubble{
    background:var(--milk);
    border:1px solid var(--line);
    border-top-left-radius:5px;
    color:var(--coffee-dark);
  }
  .msg-row.user .msg-bubble{
    background:var(--coffee-dark);
    color:var(--cream);
    border-top-right-radius:5px;
  }
  .msg-time{ font-size:10.5px; color:var(--muted); margin-top:5px; }
  .msg-row.user .msg-time{ text-align:right; }

  .thinking{ display:flex; align-items:center; gap:8px; padding:6px 2px; }
  .steam-wrap{ display:flex; gap:3px; align-items:flex-end; height:16px; }
  .steam-wrap span{
    width:3px; border-radius:3px;
    background:var(--copper);
    animation: steam 1s ease-in-out infinite;
  }
  .steam-wrap span:nth-child(1){ animation-delay:0s; }
  .steam-wrap span:nth-child(2){ animation-delay:.15s; }
  .steam-wrap span:nth-child(3){ animation-delay:.3s; }
  @keyframes steam{
    0%,100%{ height:5px; opacity:.5; }
    50%{ height:16px; opacity:1; }
  }
  .thinking-text{ font-size:13px; color:var(--muted); font-style:italic; }

  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:var(--muted); text-align:center; padding:20px;
  }
  .empty-mark{
    width:64px; height:64px; border-radius:20px;
    background:linear-gradient(155deg, var(--coffee) 0%, var(--copper) 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow);
  }
  .empty-state h2{ font-family:'Fraunces', serif; color:var(--coffee-dark); font-size:21px; font-weight:600; }
  .empty-state p{ font-size:13.5px; max-width:320px; }

  .composer{
    padding:16px 40px 24px;
    background:var(--cream);
    border-top:1px solid var(--line);
  }
  .chips{ display:flex; gap:9px; margin-bottom:12px; flex-wrap:wrap; }
  .chip{
    padding:8px 15px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--milk);
    color:var(--coffee);
    font-size:12.5px; font-weight:600;
    cursor:pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .chip:hover{ background:var(--tan); border-color:var(--copper-soft); }

  .input-bar{
    display:flex; align-items:flex-end; gap:10px;
    background:var(--milk);
    border:1px solid var(--line);
    border-radius:18px;
    padding:8px 8px 8px 18px;
    box-shadow:var(--shadow);
  }
  .input-bar textarea{
    flex:1;
    border:none; outline:none; resize:none;
    background:transparent;
    font-family:'Inter';
    font-size:14.5px;
    color:var(--coffee-dark);
    max-height:140px;
    padding:10px 0;
    line-height:1.5;
  }
  .input-bar textarea::placeholder{ color:var(--muted); }
  .send-btn{
    width:42px; height:42px; border-radius:13px;
    border:none;
    background:var(--coffee-dark);
    color:var(--cream);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition: background .15s ease, transform .15s ease;
  }
  .send-btn:hover:not(:disabled){ background:var(--coffee); transform:translateY(-1px); }
  .send-btn:disabled{ opacity:.45; cursor:not-allowed; }
  .hint{ text-align:center; font-size:11px; color:var(--muted); margin-top:9px; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--tan-2); border-radius:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 10h13a1 1 0 0 1 1 1v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-4z" stroke="#FBF6EF" stroke-width="1.6"/>
          <path d="M18 11h1.5a2.5 2.5 0 0 1 0 5H18" stroke="#FBF6EF" stroke-width="1.6"/>
          <path d="M8 3c0 1-1.2 1.2-1.2 2.3S8 6.6 8 7.6M12 3c0 1-1.2 1.2-1.2 2.3S12 6.6 12 7.6" stroke="#FBF6EF" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Chai AI</div>
        <div class="brand-sub">thinking companion</div>
      </div>
    </div>

    <button class="new-chat-btn" onclick="createNewChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      New chat
    </button>

    <div class="history-label"><span>Chat History</span><span id="historyCount">0</span></div>
    <div class="history-list" id="historyList"></div>

    <button class="clear-btn" onclick="clearAllHistory()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Clear all history
    </button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="avatar-sm">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M4 10h13a1 1 0 0 1 1 1v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-4z" stroke="#FBF6EF" stroke-width="1.6"/>
            <path d="M18 11h1.5a2.5 2.5 0 0 1 0 5H18" stroke="#FBF6EF" stroke-width="1.6"/>
          </svg>
        </div>
        <div>
          <div class="topbar-title" id="topbarTitle">Chai AI</div>
          <div class="status"><span class="status-dot"></span>Online</div>
        </div>
      </div>
      <button class="export-btn" onclick="exportChat()">⬇ Export</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <div class="chips">
        <button class="chip" onclick="sendSuggestion('Explain how AI works in simple terms')">Explain AI simply</button>
        <button class="chip" onclick="sendSuggestion('Create a 1-week study plan for me')">Create a study plan</button>
        <button class="chip" onclick="sendSuggestion('Give me some good project ideas')">Project ideas</button>
      </div>
      <div class="input-bar">
        <textarea id="inputBox" rows="1" placeholder="Ask Chai AI anything..." onkeydown="handleKeyDown(event)" oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-6 16-2.5-6.5L4 12z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="hint">Press Enter to send · Shift + Enter for a new line</div>
    </div>
  </div>
</div>

<script>
  // ---------- STATE (in-memory only, no localStorage) ----------
  let chats = [];
  let activeChatId = null;
  let isSending = false;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function createNewChat(){
    const chat = { id: uid(), title: "New chat", messages: [] };
    chats.unshift(chat);
    activeChatId = chat.id;
    renderHistory();
    renderMessages();
  }

  function getActiveChat(){
    return chats.find(c => c.id === activeChatId);
  }

  function switchChat(id){
    activeChatId = id;
    renderHistory();
    renderMessages();
  }

  function deleteChat(id, ev){
    ev.stopPropagation();
    chats = chats.filter(c => c.id !== id);
    if (activeChatId === id){
      activeChatId = chats.length ? chats[0].id : null;
    }
    if (!chats.length) createNewChat();
    renderHistory();
    renderMessages();
  }

  function clearAllHistory(){
    chats = [];
    createNewChat();
  }

  function formatTime(ts){
    const d = new Date(ts);
    return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  function renderHistory(){
    const list = document.getElementById('historyList');
    document.getElementById('historyCount').textContent = chats.length;
    list.innerHTML = '';
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'history-item' + (chat.id === activeChatId ? ' active' : '');
      item.onclick = () => switchChat(chat.id);
      item.innerHTML = `
        <div class="history-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.6 8.6 0 0 1-3.6-.9L4 20l1.1-4a8.4 8.4 0 0 1-1.1-4.2A8.4 8.4 0 0 1 12.5 3a8.4 8.4 0 0 1 8.5 8.5z" stroke="#6B4426" stroke-width="1.5"/></svg>
        </div>
        <div class="history-text">
          <div class="history-title">${escapeHtml(chat.title)}</div>
          <div class="history-meta">${chat.messages.length} messages</div>
        </div>
        <button class="history-del" onclick="deleteChat('${chat.id}', event)">✕</button>
      `;
      list.appendChild(item);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderMessages(){
    const wrap = document.getElementById('messages');
    const chat = getActiveChat();
    document.getElementById('topbarTitle').textContent = chat ? chat.title : 'Chai AI';

    if (!chat || chat.messages.length === 0){
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-mark">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M4 10h13a1 1 0 0 1 1 1v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-4z" stroke="#FBF6EF" stroke-width="1.6"/>
              <path d="M18 11h1.5a2.5 2.5 0 0 1 0 5H18" stroke="#FBF6EF" stroke-width="1.6"/>
            </svg>
          </div>
          <h2>Let's start a conversation</h2>
          <p>Ask anything — Chai AI will give you a thoughtful, accurate answer. Type below to get started.</p>
        </div>`;
      return;
    }

    wrap.innerHTML = '';
    chat.messages.forEach(m => {
      const row = document.createElement('div');
      row.className = 'msg-row ' + m.role;
      row.innerHTML = `
        <div class="msg-avatar ${m.role}">${m.role === 'user' ? 'You' : ''}</div>
        <div>
          <div class="msg-bubble">${escapeHtml(m.content)}</div>
          <div class="msg-time">${formatTime(m.time)}</div>
        </div>
      `;
      wrap.appendChild(row);
    });
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showThinking(){
    const wrap = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'thinkingRow';
    row.innerHTML = `
      <div class="msg-avatar assistant"></div>
      <div class="msg-bubble">
        <div class="thinking">
          <div class="steam-wrap"><span></span><span></span><span></span></div>
          <span class="thinking-text">Brewing a response...</span>
        </div>
      </div>
    `;
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function removeThinking(){
    const row = document.getElementById('thinkingRow');
    if (row) row.remove();
  }

  function autoGrow(el){
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKeyDown(ev){
    if (ev.key === 'Enter' && !ev.shiftKey){
      ev.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(text){
    document.getElementById('inputBox').value = text;
    sendMessage();
  }

  async function sendMessage(){
    if (isSending) return;
    const box = document.getElementById('inputBox');
    const text = box.value.trim();
    if (!text) return;

    if (!activeChatId) createNewChat();
    const chat = getActiveChat();

    if (chat.messages.length === 0){
      chat.title = text.length > 28 ? text.slice(0,28) + '…' : text;
    }
    chat.messages.push({ role:'user', content:text, time:Date.now() });
    box.value = '';
    autoGrow(box);
    renderHistory();
    renderMessages();

    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    showThinking();

    try {
      const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: apiMessages })
      });
      const data = await response.json();
      let reply = "Sorry, I couldn't get a response. Please try again.";
      if (data && data.content){
        reply = data.content.map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\\n');
      }
      removeThinking();
      chat.messages.push({ role:'assistant', content: reply || reply, time: Date.now() });
    } catch(err){
      removeThinking();
      chat.messages.push({ role:'assistant', content: "Something went wrong — please check your connection and try again.", time: Date.now() });
    }

    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    renderHistory();
    renderMessages();
  }

  function exportChat(){
    const chat = getActiveChat();
    if (!chat || !chat.messages.length) return;
    const text = chat.messages.map(m => `[${m.role === 'user' ? 'You' : 'Chai AI'}] ${m.content}`).join('\\n\\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (chat.title || 'chat') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  // init
  createNewChat();
</script>
</body>
</html>
